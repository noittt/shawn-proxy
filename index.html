<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAWN'S PROXY - FIXED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030712;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: #111827;
            border: 4px solid #00ffff;
            border-radius: 60px;
            padding: 2rem;
            box-shadow: 0 0 100px #00ffff99;
        }

        h1 {
            font-size: 6rem;
            text-align: center;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px cyan;
            margin-bottom: 0.2rem;
        }

        .tagline {
            text-align: center;
            color: #ffaa00;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 20px orange;
            margin-bottom: 2rem;
            border-bottom: 2px dashed #ff00ff;
            padding-bottom: 1rem;
        }

        .service-tabs {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab {
            background: #1f2a44;
            border: 2px solid #4b5563;
            padding: 1rem 3rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.3rem;
            transition: 0.2s;
        }

        .tab:hover {
            border-color: #00ffff;
            background: #2d3b60;
        }

        .tab.active {
            background: #00d4ff;
            border-color: white;
            color: black;
            box-shadow: 0 0 30px cyan;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        #searchInput {
            flex: 1;
            min-width: 300px;
            background: #1f2a44;
            border: 3px solid #3b82f6;
            border-radius: 60px;
            padding: 1.3rem 2rem;
            font-size: 1.4rem;
            color: white;
            outline: none;
        }

        #searchInput:focus {
            border-color: #00ffff;
            box-shadow: 0 0 30px cyan;
        }

        #searchBtn {
            background: linear-gradient(45deg, #2563eb, #c026d3);
            border: none;
            border-radius: 60px;
            padding: 1.3rem 4rem;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            border: 3px solid #00ffff;
            transition: 0.2s;
        }

        #searchBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff00ff;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
            min-height: 400px;
        }

        .video-card {
            background: #1e293b;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid #475569;
            cursor: pointer;
            transition: 0.2s;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: #00ffff;
            box-shadow: 0 0 30px cyan;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #2d3a5e;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            padding: 1rem;
        }

        .title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
            color: white;
        }

        .channel {
            color: #88aaff;
        }

        .instagram-card {
            background: linear-gradient(145deg, #833ab4, #fd1d1d, #fcb045);
            border-radius: 30px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            border: 3px solid white;
            transition: 0.2s;
        }

        .instagram-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px #ff00ff;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding: 1rem 2rem;
            background: #1f2a44;
            border-radius: 60px;
        }

        #status {
            color: #4ade80;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 30px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        .worker-status {
            background: #1e1b4b;
            border-left: 10px solid #00ffff;
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SHAWN'S PROXY</h1>
        <div class="tagline">🔱 YOUTUBE + INSTAGRAM - SIGN-IN FIXED 🔱</div>

        <div class="worker-status" id="workerStatus">
            ✅ YOUR WORKER IS LIVE: https://shawn-proxy-worker.shawn-johnson.workers.dev
        </div>

        <div class="service-tabs">
            <div class="tab active" data-service="youtube">🎬 YOUTUBE</div>
            <div class="tab" data-service="instagram">📷 INSTAGRAM</div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="YouTube: search or paste video link...">
            <button id="searchBtn">GO</button>
        </div>

        <div class="results-grid" id="resultsGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #88aaff; font-size: 1.3rem;">
                🔥 Select a service and search 🔥
            </div>
        </div>

        <div class="status-bar">
            <div>
                <span id="status">⚡ Using YOUR Cloudflare Worker</span>
            </div>
            <div>
                <button id="resetBtn" style="background: #374151; border: none; color: white; padding: 0.5rem 2rem; border-radius: 50px; cursor: pointer;">⟲ RESET</button>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script>
        // 🔴 YOUR ACTUAL CLOUDFLARE WORKER URL
        const WORKER_URL = 'https://shawn-proxy-worker.shawn-johnson.workers.dev';

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const statusEl = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const messageEl = document.getElementById('message');
        const workerStatus = document.getElementById('workerStatus');
        const tabs = document.querySelectorAll('.tab');

        let activeService = 'youtube';

        // Set active service
        function setActiveService(service) {
            tabs.forEach(tab => {
                if (tab.dataset.service === service) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            activeService = service;
            
            if (service === 'youtube') {
                searchInput.placeholder = 'YouTube: search or paste video link...';
                statusEl.textContent = '⚡ YouTube mode - sign-in bypass active';
            } else {
                searchInput.placeholder = 'Instagram: enter username (e.g., @natgeo or natgeo)';
                statusEl.textContent = '⚡ Instagram mode - mobile view active';
            }
        }

        function showMessage(msg, isError = true) {
            messageEl.style.display = 'block';
            messageEl.textContent = msg;
            messageEl.style.background = isError ? '#dc2626' : '#059669';
            if (!isError) setTimeout(() => messageEl.style.display = 'none', 3000);
        }

        async function searchVideos() {
            const query = searchInput.value.trim();
            if (!query) {
                showMessage('Enter something to search');
                return;
            }

            statusEl.textContent = `🔍 Loading via YOUR worker...`;
            
            if (activeService === 'youtube') {
                await searchYouTube(query);
            } else {
                await loadInstagram(query);
            }
        }

        async function searchYouTube(query) {
            resultsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;">Loading YouTube...</div>';

            try {
                // Check if it's a direct video link
                let videoId = null;
                
                if (query.includes('youtube.com/watch?v=')) {
                    videoId = query.split('watch?v=')[1].split('&')[0];
                } else if (query.includes('youtu.be/')) {
                    videoId = query.split('youtu.be/')[1].split('?')[0];
                } else if (query.match(/^[a-zA-Z0-9_-]{11}$/)) {
                    // If it looks like a video ID
                    videoId = query;
                }

                if (videoId) {
                    // Direct video - use embed to avoid sign-in [citation:3]
                    const embedUrl = `${WORKER_URL}/?url=${encodeURIComponent('https://youtube.com/embed/' + videoId)}`;
                    resultsGrid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                            <div style="background: #1e293b; border-radius: 30px; padding: 2rem;">
                                <h2 style="color: #00ffff; margin-bottom: 1rem;">▶️ Video Ready</h2>
                                <p style="color: #88aaff; margin-bottom: 2rem;">Click below to watch (no sign-in required)</p>
                                <button onclick="window.open('${embedUrl}', '_blank')" 
                                        style="background: linear-gradient(45deg, #2563eb, #c026d3); color: white; padding: 1rem 3rem; border: none; border-radius: 60px; font-size: 1.3rem; cursor: pointer; border: 3px solid #00ffff;">
                                    🎬 WATCH VIDEO
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    // Search for videos
                    const searchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
                    const proxyUrl = `${WORKER_URL}/?url=${encodeURIComponent(searchUrl)}`;
                    
                    const response = await fetch(proxyUrl);
                    const html = await response.text();
                    
                    // Extract video IDs
                    const videoIds = extractYouTubeIds(html);
                    
                    if (videoIds.length === 0) {
                        throw new Error('No videos found');
                    }

                    resultsGrid.innerHTML = videoIds.slice(0, 12).map(id => {
                        const embedUrl = `${WORKER_URL}/?url=${encodeURIComponent('https://youtube.com/embed/' + id)}`;
                        
                        return `
                            <div class="video-card" onclick="window.open('${embedUrl}', '_blank')">
                                <div class="thumbnail">
                                    <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" loading="lazy">
                                </div>
                                <div class="info">
                                    <div class="title">Video ID: ${id}</div>
                                    <div class="channel">Click to watch (no sign-in)</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                statusEl.textContent = '✅ YouTube loaded - sign-in bypass active';
                workerStatus.innerHTML = '✅ YOUR WORKER IS WORKING! YouTube sign-in bypass enabled.';
                showMessage('Success!', false);

            } catch (error) {
                console.error('Error:', error);
                resultsGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                        <p style="color: #ff8888; margin-bottom: 1rem;">Error: ${error.message}</p>
                        <button onclick="window.open('https://piped.video/search?q=${encodeURIComponent(query)}', '_blank')" 
                                style="background: #00ffff; color: black; padding: 1rem 2rem; border: none; border-radius: 50px; margin: 0.5rem; cursor: pointer;">
                            🔍 Try Alternative
                        </button>
                    </div>
                `;
            }
        }

        async function loadInstagram(username) {
            resultsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;">Loading Instagram...</div>';

            try {
                // Clean username
                let cleanUsername = username.replace('@', '').trim();
                
                // Create Instagram profile URL
                const instagramUrl = `https://www.instagram.com/${cleanUsername}/`;
                const proxyUrl = `${WORKER_URL}/?url=${encodeURIComponent(instagramUrl)}`;

                // Show Instagram in a mobile-friendly iframe [citation:1]
                resultsGrid.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div style="background: linear-gradient(145deg, #833ab4, #fd1d1d, #fcb045); border-radius: 30px; padding: 2rem; margin-bottom: 2rem; text-align: center;">
                            <h2 style="color: white; margin-bottom: 1rem;">📷 @${cleanUsername}</h2>
                            <p style="color: white; margin-bottom: 2rem;">Click below to open Instagram in mobile view</p>
                            <button onclick="window.open('${proxyUrl}', '_blank')" 
                                    style="background: white; color: black; padding: 1rem 3rem; border: none; border-radius: 60px; font-size: 1.3rem; cursor: pointer; font-weight: bold;">
                                📱 OPEN INSTAGRAM
                            </button>
                        </div>
                        <div style="background: #1e293b; border-radius: 30px; padding: 2rem; text-align: center;">
                            <p style="color: #88aaff; margin-bottom: 1rem;">💡 Tips:</p>
                            <p style="color: white;">• Use mobile view for best experience</p>
                            <p style="color: white;">• Try usernames like: natgeo, zuck, nasa</p>
                            <p style="color: white;">• Instagram limits some content via proxy</p>
                        </div>
                    </div>
                `;

                statusEl.textContent = '✅ Instagram ready - mobile mode active';
                workerStatus.innerHTML = '✅ YOUR WORKER IS WORKING! Instagram mobile mode enabled.';
                showMessage('Instagram loaded!', false);

            } catch (error) {
                console.error('Error:', error);
                resultsGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                        <p style="color: #ff8888; margin-bottom: 1rem;">Error: ${error.message}</p>
                        <p style="color: #88aaff;">Try a different username</p>
                        <button onclick="loadInstagram('natgeo')" style="background: #00ffff; color: black; padding: 1rem 2rem; border: none; border-radius: 50px; margin-top: 1rem; cursor: pointer;">
                            📷 Try @natgeo
                        </button>
                    </div>
                `;
            }
        }

        // Extract YouTube video IDs from HTML
        function extractYouTubeIds(html) {
            const regex = /"videoId":"([^"]+)"/g;
            const matches = [];
            let match;
            while ((match = regex.exec(html)) !== null) {
                if (!matches.includes(match[1])) {
                    matches.push(match[1]);
                }
            }
            return matches;
        }

        // Tab click handlers
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                setActiveService(tab.dataset.service);
            });
        });

        searchBtn.addEventListener('click', searchVideos);
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchVideos();
        });

        resetBtn.addEventListener('click', () => {
            resultsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #88aaff; font-size: 1.3rem;">🔥 Select a service and search 🔥</div>';
            statusEl.textContent = '⚡ Using YOUR Cloudflare Worker';
            showMessage('Reset complete', false);
        });

        // Initialize
        setActiveService('youtube');
    </script>
</body>
</html>
