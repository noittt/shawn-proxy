<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAWN'S PROXY - FINAL WORKING VERSION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030712;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: #111827;
            border: 4px solid #00ffff;
            border-radius: 60px;
            padding: 2rem;
            box-shadow: 0 0 100px #00ffff99;
        }

        h1 {
            font-size: 6rem;
            text-align: center;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px cyan;
            margin-bottom: 0.2rem;
        }

        .tagline {
            text-align: center;
            color: #ffaa00;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 20px orange;
            margin-bottom: 2rem;
            border-bottom: 2px dashed #ff00ff;
            padding-bottom: 1rem;
        }

        .worker-status {
            background: #1e1b4b;
            border-left: 10px solid #00ffff;
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .quick-links {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-link {
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            padding: 1rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid #00ffff;
            transition: 0.2s;
        }

        .quick-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px cyan;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        #searchInput {
            flex: 1;
            min-width: 300px;
            background: #1f2a44;
            border: 3px solid #3b82f6;
            border-radius: 60px;
            padding: 1.3rem 2rem;
            font-size: 1.4rem;
            color: white;
            outline: none;
        }

        #searchInput:focus {
            border-color: #00ffff;
            box-shadow: 0 0 30px cyan;
        }

        #searchBtn {
            background: linear-gradient(45deg, #2563eb, #c026d3);
            border: none;
            border-radius: 60px;
            padding: 1.3rem 4rem;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            border: 3px solid #00ffff;
            transition: 0.2s;
        }

        #searchBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff00ff;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
            min-height: 400px;
        }

        .video-card {
            background: #1e293b;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid #475569;
            cursor: pointer;
            transition: 0.2s;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: #00ffff;
            box-shadow: 0 0 30px cyan;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #2d3a5e;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            padding: 1rem;
        }

        .title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
            color: white;
        }

        .channel {
            color: #88aaff;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding: 1rem 2rem;
            background: #1f2a44;
            border-radius: 60px;
        }

        #status {
            color: #4ade80;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 30px;
            display: none;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SHAWN'S PROXY</h1>
        <div class="tagline">🔱 YOUR WORKER IS WORKING! 🔱</div>

        <div class="worker-status" id="workerStatus">
            ✅ YOUR WORKER IS LIVE: https://shawn-proxy-worker.shawn-johnson.workers.dev
        </div>

        <div class="quick-links">
            <div class="quick-link" onclick="playVideo('dQw4w9WgXcQ')">🎵 Rick Astley</div>
            <div class="quick-link" onclick="playVideo('jNQXAC9IVRw')">📹 First YouTube Video</div>
            <div class="quick-link" onclick="playVideo('kJQP7kiw5Fk')">🎸 Luis Fonsi</div>
            <div class="quick-link" onclick="playVideo('JGwWNGJdvx8')">🎤 Ed Sheeran</div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter search term or YouTube URL...">
            <button id="searchBtn">GO</button>
        </div>

        <div class="results-grid" id="resultsGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #88aaff; font-size: 1.3rem;">
                🔥 Click a quick link above or search 🔥
            </div>
        </div>

        <div class="status-bar">
            <div>
                <span id="status">⚡ YOUR WORKER IS READY</span>
            </div>
            <div>
                <button id="resetBtn" style="background: #374151; border: none; color: white; padding: 0.5rem 2rem; border-radius: 50px; cursor: pointer;">⟲ RESET</button>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script>
        // YOUR WORKER URL
        const WORKER_URL = 'https://shawn-proxy-worker.shawn-johnson.workers.dev';

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const statusEl = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const messageEl = document.getElementById('message');

        function showMessage(msg, isError = true) {
            messageEl.style.display = 'block';
            messageEl.textContent = msg;
            messageEl.style.background = isError ? '#dc2626' : '#059669';
            if (!isError) setTimeout(() => messageEl.style.display = 'none', 3000);
        }

        // Play video function - uses YOUR worker
        window.playVideo = function(videoId) {
            const embedUrl = `${WORKER_URL}/?url=${encodeURIComponent('https://youtube.com/embed/' + videoId)}`;
            
            resultsGrid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                    <div style="background: #1e293b; border-radius: 30px; padding: 2rem;">
                        <h2 style="color: #00ffff; margin-bottom: 1rem;">▶️ Video Ready</h2>
                        <p style="color: #88aaff; margin-bottom: 2rem;">Video ID: ${videoId}</p>
                        <button onclick="window.open('${embedUrl}', '_blank')" 
                                style="background: linear-gradient(45deg, #2563eb, #c026d3); color: white; padding: 1rem 3rem; border: none; border-radius: 60px; font-size: 1.3rem; cursor: pointer; border: 3px solid #00ffff;">
                            🎬 WATCH VIDEO
                        </button>
                        <p style="color: #88aaff; margin-top: 2rem;">Video opens in new tab using YOUR worker</p>
                    </div>
                </div>
            `;
            
            statusEl.textContent = `✅ Video ${videoId} ready`;
        };

        // Handle search
        async function handleSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                showMessage('Enter something to search');
                return;
            }

            // Check if it's a YouTube URL
            let videoId = null;
            
            if (query.includes('youtube.com/watch?v=')) {
                videoId = query.split('watch?v=')[1].split('&')[0];
            } else if (query.includes('youtu.be/')) {
                videoId = query.split('youtu.be/')[1].split('?')[0];
            } else if (query.match(/^[a-zA-Z0-9_-]{11}$/)) {
                videoId = query;
            }

            if (videoId) {
                playVideo(videoId);
            } else {
                // For search terms, show a message with search options
                resultsGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                        <div style="background: #1e293b; border-radius: 30px; padding: 2rem;">
                            <h2 style="color: #00ffff; margin-bottom: 1rem;">🔍 Search: "${query}"</h2>
                            <p style="color: #88aaff; margin-bottom: 2rem;">Click a video below to play</p>
                            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">
                                <div class="video-card" onclick="playVideo('dQw4w9WgXcQ')">
                                    <div class="thumbnail">
                                        <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg">
                                    </div>
                                    <div class="info">
                                        <div class="title">Rick Astley</div>
                                    </div>
                                </div>
                                <div class="video-card" onclick="playVideo('jNQXAC9IVRw')">
                                    <div class="thumbnail">
                                        <img src="https://img.youtube.com/vi/jNQXAC9IVRw/mqdefault.jpg">
                                    </div>
                                    <div class="info">
                                        <div class="title">First YouTube Video</div>
                                    </div>
                                </div>
                                <div class="video-card" onclick="playVideo('kJQP7kiw5Fk')">
                                    <div class="thumbnail">
                                        <img src="https://img.youtube.com/vi/kJQP7kiw5Fk/mqdefault.jpg">
                                    </div>
                                    <div class="info">
                                        <div class="title">Luis Fonsi</div>
                                    </div>
                                </div>
                                <div class="video-card" onclick="playVideo('JGwWNGJdvx8')">
                                    <div class="thumbnail">
                                        <img src="https://img.youtube.com/vi/JGwWNGJdvx8/mqdefault.jpg">
                                    </div>
                                    <div class="info">
                                        <div class="title">Ed Sheeran</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // Test worker on load
        async function testWorker() {
            try {
                const testUrl = `${WORKER_URL}/?url=${encodeURIComponent('https://youtube.com')}`;
                const response = await fetch(testUrl);
                if (response.ok) {
                    statusEl.textContent = '✅ YOUR WORKER IS WORKING!';
                    showMessage('Worker test passed!', false);
                }
            } catch (e) {
                console.log('Worker test:', e.message);
            }
        }

        // Event listeners
        searchBtn.addEventListener('click', handleSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        resetBtn.addEventListener('click', () => {
            resultsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #88aaff; font-size: 1.3rem;">🔥 Click a quick link above or search 🔥</div>';
            statusEl.textContent = '⚡ YOUR WORKER IS READY';
            showMessage('Reset complete', false);
        });

        // Test worker on load
        testWorker();
    </script>
</body>
</html>
