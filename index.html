<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAWN'S PROXY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030712;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            background: #111827;
            border: 4px solid #00ffff;
            border-radius: 50px;
            padding: 2rem;
            box-shadow: 0 0 100px #00ffff99;
        }

        h1 {
            font-size: 6rem;
            text-align: center;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px cyan;
            margin-bottom: 0.2rem;
        }

        .tagline {
            text-align: center;
            color: #ffaa00;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 20px orange;
            margin-bottom: 2rem;
            border-bottom: 2px dashed #ff00ff;
            padding-bottom: 1rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        #searchInput {
            flex: 1;
            min-width: 300px;
            background: #1f2a44;
            border: 3px solid #3b82f6;
            border-radius: 60px;
            padding: 1.3rem 2rem;
            font-size: 1.4rem;
            color: white;
            outline: none;
        }

        #searchBtn {
            background: linear-gradient(45deg, #2563eb, #c026d3);
            border: none;
            border-radius: 60px;
            padding: 1.3rem 4rem;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            border: 3px solid #00ffff;
        }

        #searchBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff00ff;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
            min-height: 400px;
        }

        .video-card {
            background: #1e293b;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid #475569;
            cursor: pointer;
            transition: 0.2s;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: #00ffff;
            box-shadow: 0 0 30px cyan;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #2d3a5e;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            padding: 1rem;
        }

        .title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
        }

        .channel {
            color: #88aaff;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding: 1rem 2rem;
            background: #1f2a44;
            border-radius: 60px;
        }

        #status {
            color: #4ade80;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 30px;
            display: none;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SHAWN'S PROXY</h1>
        <div class="tagline">🔱 100% MINE - NOT INVIDIOUS 🔱</div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search YouTube...">
            <button id="searchBtn">GO</button>
        </div>

        <div class="results-grid" id="resultsGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #88aaff; font-size: 1.3rem;">
                🔥 Enter a search term above 🔥
            </div>
        </div>

        <div class="status-bar">
            <div>
                <span id="status">⚡ Shawn's Proxy Ready</span>
            </div>
            <div>
                <button id="resetBtn" style="background: #374151; border: none; color: white; padding: 0.5rem 2rem; border-radius: 50px; cursor: pointer;">⟲ RESET</button>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const statusEl = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const messageEl = document.getElementById('message');

        function showMessage(msg, isError = true) {
            messageEl.style.display = 'block';
            messageEl.textContent = msg;
            messageEl.style.background = isError ? '#dc2626' : '#059669';
            if (!isError) setTimeout(() => messageEl.style.display = 'none', 3000);
        }

        async function searchVideos() {
            const query = searchInput.value.trim();
            if (!query) {
                showMessage('Enter something to search');
                return;
            }

            statusEl.textContent = '🔍 Searching...';
            resultsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;">Loading...</div>';

            try {
                // Use public API
                const response = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (!data || !data.items || data.items.length === 0) {
                    throw new Error('No results');
                }

                resultsGrid.innerHTML = data.items.slice(0, 20).map(item => `
                    <div class="video-card" onclick="window.open('https://piped.video/watch?v=${item.url.split('=')[1]}', '_blank')">
                        <div class="thumbnail">
                            <img src="${item.thumbnail}" loading="lazy">
                        </div>
                        <div class="info">
                            <div class="title">${item.title.substring(0, 60)}${item.title.length > 60 ? '...' : ''}</div>
                            <div class="channel">${item.uploaderName}</div>
                        </div>
                    </div>
                `).join('');

                statusEl.textContent = `✅ Found ${data.items.length} videos - Shawn's Proxy`;
                showMessage('Search complete!', false);

            } catch (error) {
                resultsGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                        <p style="color: #ff8888; margin-bottom: 1rem;">Error loading</p>
                        <button onclick="window.open('https://piped.video/search?q=${encodeURIComponent(query)}', '_blank')" 
                                style="background: #00ffff; color: black; padding: 1rem 2rem; border: none; border-radius: 50px;">
                            🔍 Open Search
                        </button>
                    </div>
                `;
                statusEl.textContent = '❌ Error - Try again';
            }
        }

        searchBtn.addEventListener('click', searchVideos);
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchVideos();
        });

        resetBtn.addEventListener('click', () => {
            resultsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #88aaff; font-size: 1.3rem;">🔥 Enter a search term above 🔥</div>';
            statusEl.textContent = '⚡ Shawn\'s Proxy Ready';
            showMessage('Reset complete', false);
        });

        // Load something on startup
        window.addEventListener('load', () => {
            searchInput.value = 'popular music';
            setTimeout(searchVideos, 500);
        });
    </script>
</body>
</html>
