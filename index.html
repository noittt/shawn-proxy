<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAWN'S PROXY - FULLY WORKING</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030712;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background: #111827;
            border: 4px solid #00ffff;
            border-radius: 60px;
            padding: 2rem;
            box-shadow: 0 0 100px #00ffff99;
        }

        h1 {
            font-size: 6rem;
            text-align: center;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px cyan;
            margin-bottom: 0.2rem;
        }

        .tagline {
            text-align: center;
            color: #ffaa00;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 20px orange;
            margin-bottom: 2rem;
            border-bottom: 2px dashed #ff00ff;
            padding-bottom: 1rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        #searchInput {
            flex: 1;
            min-width: 300px;
            background: #1f2a44;
            border: 3px solid #3b82f6;
            border-radius: 60px;
            padding: 1.3rem 2rem;
            font-size: 1.4rem;
            color: white;
            outline: none;
        }

        #searchInput:focus {
            border-color: #00ffff;
            box-shadow: 0 0 30px cyan;
        }

        #searchBtn {
            background: linear-gradient(45deg, #2563eb, #c026d3);
            border: none;
            border-radius: 60px;
            padding: 1.3rem 4rem;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            border: 3px solid #00ffff;
            transition: 0.2s;
        }

        #searchBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px #ff00ff;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
            min-height: 400px;
        }

        .video-card {
            background: #1e293b;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid #475569;
            cursor: pointer;
            transition: 0.2s;
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: #00ffff;
            box-shadow: 0 0 30px cyan;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #2d3a5e;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            padding: 1rem;
        }

        .title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
            color: white;
        }

        .channel {
            color: #88aaff;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding: 1rem 2rem;
            background: #1f2a44;
            border-radius: 60px;
        }

        #status {
            color: #4ade80;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 30px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        .worker-status {
            background: #1e1b4b;
            border-left: 10px solid #00ffff;
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }

        .quick-links {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-link {
            background: #2d3a5e;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            border: 2px solid #3b82f6;
        }

        .quick-link:hover {
            border-color: #00ffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SHAWN'S PROXY</h1>
        <div class="tagline">🔱 YOUR WORKER IS WORKING! 🔱</div>

        <div class="worker-status" id="workerStatus">
            ✅ YOUR WORKER IS LIVE: https://shawn-proxy-worker.shawn-johnson.workers.dev
        </div>

        <div class="quick-links">
            <span class="quick-link" onclick="loadVideo('dQw4w9WgXcQ')">🎵 Rick Astley</span>
            <span class="quick-link" onclick="loadVideo('jNQXAC9IVRw')">📹 First YouTube Video</span>
            <span class="quick-link" onclick="loadVideo('kJQP7kiw5Fk')">🎸 Luis Fonsi</span>
            <span class="quick-link" onclick="loadVideo('JGwWNGJdvx8')">🎤 Ed Sheeran</span>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search YouTube or paste video link...">
            <button id="searchBtn">GO</button>
        </div>

        <div class="results-grid" id="resultsGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #88aaff; font-size: 1.3rem;">
                🔥 Enter a search term above or click a quick link 🔥
            </div>
        </div>

        <div class="status-bar">
            <div>
                <span id="status">⚡ Using YOUR Cloudflare Worker</span>
            </div>
            <div>
                <button id="resetBtn" style="background: #374151; border: none; color: white; padding: 0.5rem 2rem; border-radius: 50px; cursor: pointer;">⟲ RESET</button>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script>
        // 🔴 YOUR ACTUAL CLOUDFLARE WORKER URL
        const WORKER_URL = 'https://shawn-proxy-worker.shawn-johnson.workers.dev';

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const statusEl = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const messageEl = document.getElementById('message');
        const workerStatus = document.getElementById('workerStatus');

        function showMessage(msg, isError = true) {
            messageEl.style.display = 'block';
            messageEl.textContent = msg;
            messageEl.style.background = isError ? '#dc2626' : '#059669';
            if (!isError) setTimeout(() => messageEl.style.display = 'none', 3000);
        }

        // Function to load a video by ID
        window.loadVideo = function(videoId) {
            const embedUrl = `${WORKER_URL}/?url=${encodeURIComponent('https://youtube.com/embed/' + videoId)}`;
            
            resultsGrid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                    <div style="background: #1e293b; border-radius: 30px; padding: 2rem;">
                        <h2 style="color: #00ffff; margin-bottom: 1rem;">▶️ Video Ready</h2>
                        <p style="color: #88aaff; margin-bottom: 2rem;">Video ID: ${videoId}</p>
                        <button onclick="window.open('${embedUrl}', '_blank')" 
                                style="background: linear-gradient(45deg, #2563eb, #c026d3); color: white; padding: 1rem 3rem; border: none; border-radius: 60px; font-size: 1.3rem; cursor: pointer; border: 3px solid #00ffff;">
                            🎬 WATCH VIDEO
                        </button>
                        <p style="color: #88aaff; margin-top: 2rem;">Your worker is working! Video will open in new tab.</p>
                    </div>
                </div>
            `;
            
            statusEl.textContent = `✅ Video ${videoId} ready`;
        };

        async function searchYouTube() {
            const query = searchInput.value.trim();
            if (!query) {
                showMessage('Enter something to search');
                return;
            }

            statusEl.textContent = '🔍 Searching...';
            resultsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;">Loading...</div>';

            try {
                // Check if it's a direct video link
                let videoId = null;
                
                if (query.includes('youtube.com/watch?v=')) {
                    videoId = query.split('watch?v=')[1].split('&')[0];
                } else if (query.includes('youtu.be/')) {
                    videoId = query.split('youtu.be/')[1].split('?')[0];
                } else if (query.match(/^[a-zA-Z0-9_-]{11}$/)) {
                    videoId = query;
                }

                if (videoId) {
                    loadVideo(videoId);
                } else {
                    // Search for videos using public API
                    const response = await fetch(`https://piped.video/api/v1/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    if (!data || data.length === 0) {
                        throw new Error('No results');
                    }

                    resultsGrid.innerHTML = data.slice(0, 12).map(item => {
                        const videoId = item.url.split('=')[1] || item.url;
                        return `
                            <div class="video-card" onclick="loadVideo('${videoId}')">
                                <div class="thumbnail">
                                    <img src="${item.thumbnail}" loading="lazy">
                                </div>
                                <div class="info">
                                    <div class="title">${item.title.substring(0, 60)}${item.title.length > 60 ? '...' : ''}</div>
                                    <div class="channel">${item.uploaderName}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                statusEl.textContent = '✅ YouTube loaded';
                showMessage('Success!', false);

            } catch (error) {
                console.error('Error:', error);
                resultsGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                        <p style="color: #ff8888; margin-bottom: 1rem;">Error: ${error.message}</p>
                        <p style="color: #88aaff; margin-bottom: 1rem;">Try a quick link above!</p>
                    </div>
                `;
            }
        }

        // Test worker function
        window.testWorker = async function() {
            try {
                const testUrl = `${WORKER_URL}/?url=${encodeURIComponent('https://youtube.com')}`;
                const response = await fetch(testUrl);
                alert(`Worker response: ${response.status} OK - Worker is working!`);
            } catch (e) {
                alert(`Worker test failed: ${e.message}`);
            }
        };

        // Run test on load
        setTimeout(testWorker, 1000);

        searchBtn.addEventListener('click', searchYouTube);
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchYouTube();
        });

        resetBtn.addEventListener('click', () => {
            resultsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #88aaff; font-size: 1.3rem;">🔥 Enter a search term above or click a quick link 🔥</div>';
            statusEl.textContent = '⚡ Using YOUR Cloudflare Worker';
            showMessage('Reset complete', false);
        });
    </script>
</body>
</html>
